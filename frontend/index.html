<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login Page</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div class="login-container">
            <div class="login-header">
                <h1>เข้าสู่ระบบ</h1>
                <p>กรุณากรอกข้อมูลเพื่อเข้าสู่ระบบ</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">ชื่อผู้ใช้</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="กรอกชื่อผู้ใช้"
                        required
                    />
                    <div class="error-message" id="usernameError">
                        กรุณากรอกชื่อผู้ใช้
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="กรอกรหัสผ่าน"
                            maxlength="100"
                            required
                        />
                        <button
                            type="button"
                            class="toggle-password"
                            onclick="togglePassword()"
                        >
                            แสดง
                        </button>
                    </div>
                    <div class="char-counter" id="charCounter">
                        0 / 100 ตัวอักษร
                    </div>
                </div>

                <div class="password-requirements">
                    <h3>รหัสผ่านต้องมี:</h3>
                    <div class="requirement" id="req-length">
                        <span class="requirement-icon">○</span>
                        <span>ตัวอักษรอย่างน้อย 8 ตัว</span>
                    </div>
                    <div class="requirement" id="req-number">
                        <span class="requirement-icon">○</span>
                        <span>ตัวเลขอย่างน้อย 1 ตัว</span>
                    </div>
                    <div class="requirement" id="req-max">
                        <span class="requirement-icon">○</span>
                        <span>ไม่เกิน 100 ตัวอักษร</span>
                    </div>
                </div>

                <div class="password-requirements">
                    </div>

                <div class="form-group remember-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                    <input type="checkbox" id="rememberMe" style="width: auto; margin: 0;">
                    <label for="rememberMe" style="margin: 0; font-weight: normal; cursor: pointer; color: #333; font-size: 14px;">จดจำฉันไว้ในระบบ</label>
                </div>
                <button type="submit" class="login-btn" id="loginBtn" disabled>
                    เข้าสู่ระบบ
                </button>

                <div class="success-message" id="successMessage">
                    ✓ เข้าสู่ระบบสำเร็จ!
                </div>
            </form>
        </div>

        <script src="js/script.js"></script>
    </body>
</html>
