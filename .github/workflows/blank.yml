name: CI/CD Web Login

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      #- name: Run Playwright tests
      #  run: npx playwright test

      #- name: Upload Playwright report
      #  uses: actions/upload-artifact@v4
      #  if: always() # ให้เก็บ Report แม้ว่า Test จะตกก็ตาม
      #  with:
      #    name: playwright-report
      #    path: playwright-report/
      #    retention-days: 30


  deploy:
    needs: build-and-test # ต้องรอให้ build เสร็จก่อน
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:

      #- name: Check for HTML Errors
        #run: test -f frontend/index.html || exit 1
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./frontend" # ระบุโฟลเดอร์ที่เก็บไฟล์ HTML/CSS/JS
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4